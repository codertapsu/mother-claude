<div class="shell">
  <header class="topbar">
    <a class="brand" routerLink="/">
      <span class="dot"></span>
      Mother&nbsp;Claude
    </a>
    <nav class="tabs">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
        >Sessions</a
      >
      <a routerLink="/services" routerLinkActive="active">Services</a>
      <a routerLink="/settings" routerLinkActive="active">Settings</a>
    </nav>
    <span class="conn" [class]="connection()" [title]="'WebSocket: ' + connection()">
      {{ connection() }}
    </span>
  </header>

  @if (needsToken()) {
    <div class="banner">
      Not paired — open <a routerLink="/settings">Settings</a> to enter a token or scan the QR.
    </div>
  }

  @if (needsPermission()) {
    <div class="banner warn">
      A required macOS permission is missing —
      <a routerLink="/onboarding">finish setup</a> so Mother Claude can read your sessions.
    </div>
  }

  <main class="content">
    <router-outlet />
  </main>
</div>
